<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — ToxicLabs</title>
  <link rel="icon" type="image/png" href="ig.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #fafafa; --text: #262626; --accent: #0095f6; --card: #ffffff; --border: #dbdbdb; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .contact-card { max-width: 500px; width: 100%; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .contact-item { display: flex; align-items: center; gap: 15px; margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 10px; text-decoration: none; color: var(--text); font-weight: 600; transition: 0.3s; }
    .contact-item:hover { background: #f0f0f0; transform: translateY(-2px); }
    .icon { font-size: 20px; }
    h1 { margin-bottom: 10px; font-weight: 800; }
  </style>
</head>
<body>
  <div class="contact-card">
    <img src="ig.png" alt="Logo" style="width:50px; margin-bottom:15px;">
    <h1>Get in Touch</h1>
    <p>Have a question? We're here to help!</p>

    <a href="mailto:toxic.bots.hub@gmail.com" class="contact-item">
      <span class="icon">📧</span> toxic.bots.hub@gmail.com
    </a>

    <a href="https://t.me/toxic_io" target="_blank" class="contact-item">
      <span class="icon">✈️</span> Telegram: @toxic_io
    </a>

    <a href="https://instagram.com/tryhtml" target="_blank" class="contact-item">
      <span class="icon">📷</span> Instagram: @tryhtml
    </a>

    <a href="/" style="display:block; margin-top:20px; color:var(--accent); text-decoration:none; font-size:14px; font-weight:600;">← Back to Home</a>
  </div>
</body>
</html>
